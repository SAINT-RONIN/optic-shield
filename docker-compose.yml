version: "3.8"

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - TEMP_DIR=/app/tmp
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    volumes:
      - backend-tmp:/app/tmp

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend-tmp:
